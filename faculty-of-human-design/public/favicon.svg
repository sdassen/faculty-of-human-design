<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&amp;display=swap');
    </style>
  </defs>

  <!-- Sand / cream background -->
  <rect width="32" height="32" rx="5" fill="#EDE8DF"/>

  <!-- Top decorative line -->
  <line x1="9" y1="8.5" x2="23" y2="8.5" stroke="#1A1714" stroke-width="0.6" opacity="0.4"/>

  <!-- FHD monogram -->
  <text
    x="16" y="21.5"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="13"
    font-style="italic"
    font-weight="300"
    fill="#1A1714"
    text-anchor="middle"
    letter-spacing="1.8"
  >FHD</text>

  <!-- Bottom decorative line -->
  <line x1="9" y1="25.5" x2="23" y2="25.5" stroke="#1A1714" stroke-width="0.6" opacity="0.4"/>

</svg>
